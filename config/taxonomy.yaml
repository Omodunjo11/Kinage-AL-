# AL Market Intelligence Taxonomy
# Strategic Clustering + Weighting Model for Kinage
# Owner: Lapo
# Updated: Feb 2026

# ── CLUSTERING LOGIC ───────────────────────────────────────────

intersection_multiplier: 1.5

priority_intersections:
  - [bill_execution, family_coordination]
  - [bill_execution, cognitive_decline]
  - [family_coordination, fraud_exploitation]
  - [cognitive_decline, fraud_exploitation]
  - [bill_execution, regulatory_enforcement]
  - [remote_caregiving, bill_execution]

# ── DOMAIN STRUCTURE ───────────────────────────────────────────
# Tier 1 = Core wedge (50–60%)
# Tier 2 = Amplifiers / risk (25–30%)
# Tier 3 = Narrative / context (10–15%)

domains:

  # ── TIER 1: CORE STRATEGIC DOMAINS ────────────────────────────

  bill_execution:
    tier: 1
    weight: 0.32
    description: "Bill execution and administrative control — MVP wedge"

  family_coordination:
    tier: 1
    weight: 0.28
    description: "Family coordination and role clarity — platform identity"

  # ── TIER 2: PROTECTIVE & RISK SIGNALS ─────────────────────────

  fraud_exploitation:
    tier: 2
    weight: 0.15
    description: "Fraud and financial exploitation — urgency amplifier"

  cognitive_decline:
    tier: 2
    weight: 0.12
    description: "Cognitive decline and financial vulnerability context"

  regulatory_enforcement:
    tier: 2
    weight: 0.05
    description: "FTC/DOJ enforcement actions — institutional authority signals"

  influence_channels:
    tier: 2
    weight: 0.05
    description: "Purchase-decision media and channel influence signals"
    subdomain:
      mainstream_editorial:
        triggers:
          - "NYT Wirecutter"
          - "Wall Street Journal"
          - "Consumer Reports"
          - "aging in place guide"
          - "home adaptation aging"
      caregiver_content_hubs:
        triggers:
          - "Caring.com"
          - "AgingCare"
          - "Next Avenue"
          - "caregiver organization tools"
          - "caregiver burnout story"
      professional_channel_media:
        triggers:
          - "AADMM"
          - "NAELA"
          - "FPA"
          - "elder law article"
          - "daily money manager blog"

  # ── TIER 3: NARRATIVE & CATEGORY CONTEXT ──────────────────────

  dignity_autonomy:
    tier: 3
    weight: 0.05
    description: "Dignity, autonomy, and independence framing"

  vendor_category:
    tier: 3
    weight: 0.03
    description: "Adjacent vendor messaging and category movement"
