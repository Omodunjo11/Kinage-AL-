  cognitive_decline:
    tier: 2
    weight: 0.12
    description: "Cognitive decline and financial vulnerability"
    subdomain:
      dementia_financial_errors:
        triggers:
          - "dementia finances"
          - "dementia"
          - "forgetting to pay bills elderly"
          - "memory loss money mistakes"
