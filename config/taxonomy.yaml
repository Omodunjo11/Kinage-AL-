  # ── TIER 3: NARRATIVE & POSITIONING SIGNALS (10-15% weight) ────────

  dignity_autonomy:
    tier: 3
    weight: 0.07
    description: "Dignity, autonomy, and control — tone alignment"
    subdomain:
