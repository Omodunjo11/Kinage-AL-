# AL Market Intelligence Taxonomy
# Source: Kinage taxonomy document + glossary
# Owner: Lapo | Updated: Feb 2026

intersection_multiplier: 1.5
priority_intersections:
  - [bill_execution, family_coordination]
  - [bill_execution, cognitive_decline]
  - [family_coordination, fraud_exploitation]
