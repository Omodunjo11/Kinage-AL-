    subdomain:
      competitor_signals:
        triggers:
          - "daily money manager software"
          - "caregiver financial platform"
          - "family financial collaboration tool"
          - "advisor oversight dashboard"
          - "secure family bill pay"

# ── BILL STATE CONTRACT ─────────────────────────────────────────────
# Do not invent new states. These are the only valid bill states.
bill_states:
  unpaid:
    definition: "Outstanding obligation. Has not been paid."
    drives: alerts, projections, user action
  paid_unverified:
    definition: "User marked as paid. System has not confirmed. = User Intent."
    drives: verification window countdown
  paid_verified:
    definition: "System confirmed payment via data matching. = System Truth."
    drives: archive, removes from active list
  needs_review:
    definition: "Paid but conflicting/ambiguous signals require attention."
    drives: review alert to signing-in user

# ── CORE OBJECT HIERARCHY ───────────────────────────────────────────
object_hierarchy:
  bill:
    primary: true
    definition: "Financial obligation requiring payment. Has amount due + due date."
    drives: alerts, projections, task list
    note: "ONLY object that represents required action"
  receipt:
    primary: false
    definition: "Confirmation a payment occurred. Does not require action."
    role: "Evidence for bill verification only"
  transaction:
    primary: false
    definition: "Read-only record of money moving. Informational."
    role: "Backend verification signal only. Never drives user task list."

# ── KEY PRINCIPLES ──────────────────────────────────────────────────
principles:
  empty_is_not_error: "No bills, no bank connected, no scan results = healthy states"
  verification_window_owner: "backend — never hardcode in FE"
  account_holder_note: "Account holder = person whose bills are managed (often elder). NOT inferred from login email."
