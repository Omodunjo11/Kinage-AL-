          - "stepping in financially parent"
          - "power of attorney timing"
          - "financial guardianship transition"

  # ── TIER 2: PROTECTIVE & RISK SIGNALS (25-30% weight) ──────────────

  fraud_exploitation:
    tier: 2
    weight: 0.15
    description: "Fraud and financial exploitation — amplifies urgency"
    subdomain:
