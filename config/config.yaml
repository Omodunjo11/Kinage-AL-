llm:
  provider: openai
  model: gpt-4o
  summary_model: gpt-4o-mini
  temperature: 0.3
  max_tokens: 4000
embeddings:
  provider: openai
  model: text-embedding-3-large
  dimensions: 3072
api_keys:
  reddit_client_id: REPLACE_ME
  reddit_client_secret: REPLACE_ME
  reddit_user_agent: AL-ingestion-bot/1.0
  rss_user_agent: kinage-al/1.0 (+signals ingestion)
taxonomy:
  path: ./config/taxonomy.yaml
ingestion:
  internal:
    source_dir: ./corpus/internal
    chunk_size: 512
    chunk_overlap: 64
  rss:
    enabled: true
    max_items_per_feed: 25
    feeds:
    - name: google_elder_financial_fraud
      url: https://news.google.com/rss/search?q=elder+financial+fraud
    - name: google_dementia_finance
      url: https://news.google.com/rss/search?q=dementia+finances
    - name: google_caregiver_finance
      url: https://news.google.com/rss/search?q=caregiver+financial+abuse
    - name: google_guardianship_cases
      url: https://news.google.com/rss/search?q=guardianship+financial+abuse
    - name: google_power_of_attorney_abuse
      url: https://news.google.com/rss/search?q=power+of+attorney+abuse
    - name: google_alzheimers_site
      url: https://news.google.com/rss/search?q=site:alz.org+Alzheimer
    - name: google_nih_alzheimers
      url: https://news.google.com/rss/search?q=site:nih.gov+Alzheimer
    - name: google_cognitive_decline
      url: https://news.google.com/rss/search?q=cognitive+decline+financial+vulnerability
    - name: google_sec_fraud
      url: https://news.google.com/rss/search?q=site:sec.gov+fraud
    - name: google_doj_financial
      url: https://news.google.com/rss/search?q=site:justice.gov+financial+fraud
    - name: google_ftc_enforcement
      url: https://news.google.com/rss/search?q=site:ftc.gov+fraud
    - name: google_fbi_financial_crimes
