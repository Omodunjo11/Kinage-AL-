    - name: google_nyt_elder_fraud
      url: https://news.google.com/rss/search?q=site:nytimes.com+elder+fraud+older+adults
    - name: google_nyt_caregiver_finance
      url: https://news.google.com/rss/search?q=site:nytimes.com+caregiver+finances+aging+parents
    - name: google_wsj_elder_fraud
      url: https://news.google.com/rss/search?q=site:wsj.com+elder+fraud+scams
    - name: google_wapo_guardianship_abuse
